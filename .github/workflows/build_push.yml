name: Build and push

on:
    push: 
        branches: [main]
    
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v7
            - name: setup python
              uses: actions/setup-python@v6
              with:
                python-version: "3.12"
            - name: install dependecies
              run: |
                python -m pip install --upgrade pip
                python -m pip install -r requirements.txt
            #- name: testing
            #  run: python app.py

    buid_push:
        needs: [build]
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v7

            #- name: Set up Docker
            #  uses: docker/setup-buildx-action@v4
            - name: docker veriosn
              run: docker --version

            - name: docker login
              uses: docker/login-action@v4
              with:
                username: ${{vars.DOCKER_USER}}
                password: ${{secrets.DOCKER_TOKEN}}
            - name: build and push 
              uses: docker/build-push-action@v7
              with:
                push: true
                context: . 
                tags: | 
                    ${{vars.DOCKER_USER}}/flask-app:latest
                    ${{vars.DOCKER_USER}}/flask-app:${{github.head_sha}}



