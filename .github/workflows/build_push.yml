name: Build and push

on:
    workflow_dispatch:
    
jobs:
    build:
        runs-on: self-hosted
        steps:
            - name: checkout code
              uses: actions/checkout@v7
            - name: setup python
              uses: actions/setup-python@v6
              with:
                python-version: "3.12"
            - name: install dependecies
              run: |
                python -m pip install --upgrade pip
                python -m pip install -r requirements.txt
            #- name: testing
            #  run: python app.py
    buid_push:
        needs: [build]
        runs-on: self-hosted
        steps:
            - name: docker setup
              uses: docker/login-action@v4
              with:
                username: ${{vars.DOCKER_USER}}
                password: ${{secrets.DOCKER_TOKEN}}
            - name: build and push 
              uses: docker/build-push-action@v7
              with:
                context: . 
                tags: | 
                    ${{vars.DOCKER_USER}}/flask-app:latest
                    ${{vars.DOCKER_USER}}/flask-app:${{github.sha}}



